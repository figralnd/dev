<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Le premier jour d'école — Animation</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <!-- SVG sprite: custom icons (no emojis) -->
    <svg width="0" height="0" style="position:absolute;left:-9999px;top:-9999px" aria-hidden="true" focusable="false">
      <defs>
        <!-- Soleil -->
        <symbol id="ico-sun" viewBox="0 0 64 64">
          <circle cx="32" cy="32" r="14" fill="#FFC83D" />
          <g stroke="#FFC83D" stroke-width="4" stroke-linecap="round">
            <line x1="32" y1="4" x2="32" y2="14" />
            <line x1="32" y1="50" x2="32" y2="60" />
            <line x1="4" y1="32" x2="14" y2="32" />
            <line x1="50" y1="32" x2="60" y2="32" />
            <line x1="10" y1="10" x2="17" y2="17" />
            <line x1="47" y1="47" x2="54" y2="54" />
            <line x1="54" y1="10" x2="47" y2="17" />
            <line x1="17" y1="47" x2="10" y2="54" />
          </g>
        </symbol>
        <!-- Marcheur -->
        <symbol id="ico-walk" viewBox="0 0 64 64">
          <circle cx="34" cy="14" r="6" fill="#F47A2A" />
          <path d="M28 22 L36 26 L40 40 L32 40 L26 28 Z" fill="#F47A2A" />
          <path d="M40 40 L48 48" stroke="#F47A2A" stroke-width="6" stroke-linecap="round" />
          <path d="M32 40 L28 54" stroke="#F47A2A" stroke-width="6" stroke-linecap="round" />
        </symbol>
        <!-- Groupe -->
        <symbol id="ico-group" viewBox="0 0 64 64">
          <circle cx="20" cy="22" r="7" fill="#B87333" />
          <circle cx="44" cy="22" r="7" fill="#B87333" />
          <circle cx="32" cy="18" r="8" fill="#B87333" />
          <rect x="12" y="32" width="40" height="16" rx="8" fill="#B87333" />
        </symbol>
        <!-- Porte -->
        <symbol id="ico-door" viewBox="0 0 64 64">
          <rect x="18" y="10" width="28" height="44" rx="2" fill="#F38BB3" />
          <circle cx="40" cy="32" r="2" fill="#C85E8D" />
        </symbol>
        <!-- Mains -->
        <symbol id="ico-hands" viewBox="0 0 64 64">
          <path d="M12 36 C18 28, 26 26, 30 34 L34 42 C36 46, 32 50, 28 48 L20 44 C16 42, 10 40, 12 36 Z" fill="#36C189" />
          <path d="M52 36 C46 28, 38 26, 34 34 L30 42 C28 46, 32 50, 36 48 L44 44 C48 42, 54 40, 52 36 Z" fill="#36C189" />
        </symbol>
        <!-- Maison stylisée -->
        <symbol id="bg-house" viewBox="0 0 96 96">
          <path d="M8 52 L48 20 L88 52 V84 H8 Z" fill="#F5DEC4" />
          <rect x="38" y="58" width="20" height="26" fill="#EBD3BC" />
        </symbol>
        <!-- École stylisée -->
        <symbol id="bg-school" viewBox="0 0 96 96">
          <rect x="16" y="30" width="64" height="46" rx="6" fill="#F5DEC4" />
          <rect x="44" y="18" width="8" height="12" fill="#F5DEC4" />
          <circle cx="48" cy="42" r="5" fill="#EBD3BC" />
        </symbol>
      </defs>
    </svg>

    <div class="page">
      <header class="opening">
        <div class="icons-row" aria-hidden="true">
          <svg class="mini"><use href="#ico-sun" /></svg>
          <svg class="mini"><use href="#ico-walk" /></svg>
          <svg class="mini"><use href="#ico-group" /></svg>
          <svg class="mini"><use href="#ico-door" /></svg>
          <svg class="mini"><use href="#ico-hands" /></svg>
        </div>
        <h1 class="title">Le premier jour d'école</h1>
        <p class="subtitle">L'aventure d'un enfant qui part à l'exploration</p>
        <div class="divider" role="presentation"></div>
      </header>

      <main class="stage" role="region" aria-live="polite">
        <div class="scene" id="scene">
          <svg class="icon" id="sceneIcon" viewBox="0 0 64 64"></svg>
          <p class="text" id="sceneText"></p>
        </div>
      </main>

      <footer class="footer-icons" aria-hidden="true">
        <svg class="mini"><use href="#ico-sun" /></svg>
        <svg class="mini"><use href="#ico-walk" /></svg>
        <svg class="mini"><use href="#ico-group" /></svg>
        <svg class="mini"><use href="#ico-door" /></svg>
        <svg class="mini"><use href="#ico-hands" /></svg>
      </footer>
    </div>

    <!-- Background figures -->
    <svg class="bg deco-left" aria-hidden="true"><use href="#bg-house" /></svg>
    <svg class="bg deco-right" aria-hidden="true"><use href="#bg-school" /></svg>

    <script src="./script.js"></script>
  </body>
  </html>
